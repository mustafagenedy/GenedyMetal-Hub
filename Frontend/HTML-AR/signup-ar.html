<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>جنيدي للمعادن - إنشاء حساب</title>
    <meta name="keywords" content="أبواب ألومنيوم, نوافذ ألومنيوم, مطابخ ألومنيوم, تصنيع معادن, مصر, الجيزة">
    <meta name="description" content="سجل في جنيدي للمعادن للحصول على وصول حصري لحلول الألومنيوم المتميزة.">
    <meta name="author" content="جنيدي للمعادن">
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- CSS File -->
    <link rel="stylesheet" href="../CSS/index.css">
    <link rel="stylesheet" href="../CSS/theme.css">
    <script src="../JS/theme.js" defer></script>
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
        }
        .auth-left {
            text-align: right;
        }
        .feature-list {
            padding-right: 0;
        }
        .form-control {
            text-align: right;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-12">
                <div class="auth-container row g-0">
                    <!-- Left Side -->
                    <div class="col-lg-5 auth-left">
                        <a href="welcome.html" class="back-to-home">
                            <i class="fas fa-arrow-left"></i>
                            العودة
                        </a>
                        
                        <div class="brand-logo">
                            <h2>جنيدي للمعادن</h2>
                        </div>
                        
                        <p class="brand-tagline">حلول الألومنيوم المتميزة في مصر</p>
                        
                        <ul class="feature-list">
                            <li><i class="fas fa-check"></i>منتجات ألومنيوم عالية الجودة</li>
                            <li><i class="fas fa-check"></i>تركيب محترف</li>
                            <li><i class="fas fa-check"></i>حلول تصميم مخصصة</li>
                            <li><i class="fas fa-check"></i>أكثر من 8 سنوات من الخبرة</li>
                            <li><i class="fas fa-check"></i>أكثر من 500 عميل راضٍ</li>
                        </ul>
                    </div>
                    
                    <!-- Right Side -->
                    <div class="col-lg-7 auth-right">
                            <form id="signupForm">
                                <div class="form-group">
                                    <input type="text" class="form-control" name="fullName" placeholder="الاسم بالكامل" required>
                                </div>
                                
                                <div class="form-group">
                                    <input type="email" class="form-control" name="email" placeholder="البريد الإلكتروني" required inputmode="email">
                                </div>
                                                            
                                <div class="form-group">
                                    <input type="tel" class="form-control" name="phone" placeholder="رقم الهاتف" required inputmode="tel" autocomplete="tel">
                                </div>
                                
                                <div class="form-group position-relative">
                                    <input type="password" class="form-control" name="password" placeholder="كلمة المرور" required aria-describedby="pw-strength-hint">
                                    <button type="button" class="password-toggle" aria-label="إظهار أو إخفاء كلمة المرور" aria-pressed="false">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                    <div class="pw-strength" aria-hidden="true">
                                        <div class="pw-strength-track">
                                            <div class="pw-strength-fill" data-score="0"></div>
                                        </div>
                                        <div class="pw-strength-checks">
                                            <span data-check="length">+8 أحرف</span>
                                            <span data-check="lower">a-z</span>
                                            <span data-check="upper">A-Z</span>
                                            <span data-check="digit">0-9</span>
                                            <span data-check="symbol">رمز</span>
                                        </div>
                                    </div>
                                    <small id="pw-strength-hint" class="visually-hidden" aria-live="polite"></small>
                                </div>
                                
                                <div class="form-group position-relative">
                                    <input type="password" class="form-control" name="confirmPassword" placeholder="تأكيد كلمة المرور" required>
                                    <button type="button" class="password-toggle" onclick="togglePassword(this)">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="terms" required>
                                    <label class="form-check-label" for="terms">
                                        أوافق على <a href="#">شروط الخدمة</a> و <a href="#">سياسة الخصوصية</a>
                                    </label>
                                </div>
                                
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-user-plus me-2"></i>إنشاء حساب
                                </button>
                            </form>

                            <!-- Message containers -->
                            <div class="success-message" id="signup-success" style="display: none;"></div>
                            <div class="error-message" id="signup-error" style="display: none;"></div>
                            
                            <div class="divider">
                                <span>أو سجل عن طريق</span>
                            </div>
                            
                            <div class="social-buttons">
                                <a href="#" class="btn-social">
                                    <i class="fab fa-google"></i>جوجل
                                </a>
                                <a href="#" class="btn-social">
                                    <i class="fab fa-facebook-f"></i>فيسبوك
                                </a>
                            </div>
                            
                            <div class="switch-form">
                                لديك حساب بالفعل؟ <a href="signin-ar.html">سجل الدخول هنا</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
    <script src="../JS/api.js"></script>
    <script src="../JS/ui.js"></script>
    <script src="../JS/signup.js"></script>
</body>
</html>
