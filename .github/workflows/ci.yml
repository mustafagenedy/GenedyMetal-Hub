name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend — install, syntax check, audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Syntax check every JS file
        run: |
          shopt -s globstar
          for f in index.js SRC/**/*.js; do
            node --check "$f" || exit 1
          done
        shell: bash

      - name: npm audit (high+)
        run: npm audit --audit-level=high

  frontend:
    name: Frontend — syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax check every JS file
        run: |
          for f in Frontend/JS/*.js; do
            node --check "$f" || exit 1
          done
        shell: bash
